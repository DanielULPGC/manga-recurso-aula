<style>
  html, body { background: #0e0a04; color: #f3ede1; }
  body { font-family: 'Shippori Mincho B1', serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow-x: hidden; }

  .liquid-glass {
    background: rgba(243, 237, 225, 0.025);
    backdrop-filter: blur(8px) saturate(1.1);
    -webkit-backdrop-filter: blur(8px) saturate(1.1);
    box-shadow: inset 0 1px 1px rgba(243, 237, 225, 0.08);
    position: relative; overflow: hidden;
  }
  .liquid-glass::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(243, 237, 225, 0.32) 0%, rgba(243, 237, 225, 0.10) 20%,
      rgba(243, 237, 225, 0) 40%, rgba(243, 237, 225, 0) 60%,
      rgba(243, 237, 225, 0.10) 80%, rgba(243, 237, 225, 0.32) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  .liquid-glass-strong {
    background: rgba(243, 237, 225, 0.06);
    backdrop-filter: blur(48px) saturate(1.2);
    -webkit-backdrop-filter: blur(48px) saturate(1.2);
    box-shadow: 4px 4px 12px rgba(0,0,0,0.12), inset 0 1px 1px rgba(243,237,225,0.15);
    position: relative; overflow: hidden;
  }
  .liquid-glass-strong::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(243, 237, 225, 0.50) 0%, rgba(243, 237, 225, 0.20) 20%,
      rgba(243, 237, 225, 0) 40%, rgba(243, 237, 225, 0) 60%,
      rgba(243, 237, 225, 0.20) 80%, rgba(243, 237, 225, 0.50) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  @keyframes kenburns {
    0%   { transform: scale(1.0)  translate(0%, 0%); }
    50%  { transform: scale(1.08) translate(-1%, -1%); }
    100% { transform: scale(1.0)  translate(0%, 0%); }
  }
  .kenburns { animation: kenburns 30s ease-in-out infinite; }

  .grain::after {
    content: ""; position: absolute; inset: -50%;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.85 0 0 0 0 0.75 0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.32; mix-blend-mode: overlay; pointer-events: none;
    animation: grainShift 6s steps(8) infinite;
  }
  @keyframes grainShift {
    0% { transform: translate(0,0); } 25% { transform: translate(-2%, 1%); }
    50% { transform: translate(1%, -2%); } 75% { transform: translate(-1%, -1%); }
    100% { transform: translate(0,0); }
  }

  .wave-bg {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400' opacity='0.06'><path d='M0,200 Q100,140 200,200 T400,200 T600,200 T800,200 L800,400 L0,400 Z' fill='%23f3ede1'/><path d='M0,240 Q120,180 240,240 T480,240 T720,240 T960,240 L960,400 L0,400 Z' fill='%23b8341d' opacity='0.5'/><path d='M0,280 Q150,220 300,280 T600,280 T900,280 L900,400 L0,400 Z' fill='%23b8860b' opacity='0.4'/></svg>");
    background-size: 100% 100%; background-repeat: no-repeat; background-position: bottom;
  }

  @keyframes float-up {
    0% { transform: translateY(0); opacity: 0; }
    20% { opacity: 0.6; } 100% { transform: translateY(-100vh); opacity: 0; }
  }
  .particle {
    position: absolute; width: 2px; height: 2px;
    background: #b8860b; border-radius: 50%;
    animation: float-up var(--dur, 12s) ease-out infinite;
    animation-delay: var(--delay, 0s);
  }

  /* -- Intro de apertura (video -> frontend) --------------------- */
  #intro-overlay{position:fixed;inset:0;z-index:9999;background:#f5efe0;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    opacity:1;transition:opacity .6s ease;}
  #intro-overlay.intro-hide{opacity:0;pointer-events:none;}
  #intro-mp4{width:100%;height:100%;object-fit:contain;background:#f5efe0;}
  #intro-card{display:none;width:100%;height:100%;border:0;background:#f5efe0;}
  #intro-skip{position:fixed;right:22px;bottom:20px;z-index:10000;
    font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;letter-spacing:.06em;
    color:#1a1008;background:rgba(245,239,224,.72);border:1px solid rgba(26,16,8,.35);
    border-radius:999px;padding:8px 16px;cursor:pointer;backdrop-filter:blur(4px);}
  #intro-skip:hover{background:#1a1008;color:#f5efe0;border-color:#1a1008;}
  .profile-noscript{min-height:100vh;padding:7rem 1.5rem 3rem;background:#0e0a04;color:#f3ede1;display:flex;align-items:center;justify-content:center;text-align:center;}
  .profile-noscript-inner{max-width:860px;}
  .profile-noscript h1{font-family:'Shippori Mincho B1',serif;font-size:clamp(2.6rem,8vw,5.5rem);line-height:.98;margin:0 0 1rem;font-style:italic;}
  .profile-noscript p{margin:0 auto 2rem;max-width:620px;color:rgba(243,237,225,.78);line-height:1.7;}
  .profile-noscript-links{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;}
  .profile-noscript a{color:#f3ede1;text-decoration:none;border:1px solid rgba(243,237,225,.22);border-radius:999px;padding:.75rem 1rem;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;background:rgba(243,237,225,.06);}
